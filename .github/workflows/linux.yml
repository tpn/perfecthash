name: linux

on:
  push:
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-py313
            runner: ubuntu-24.04
            env_file: conda/environments/dev-linux_os-linux_arch-x86_64_py-313_cuda-none_compiler-llvm.yaml
            env_name: dev-linux_os-linux_arch-x86_64_py-313_cuda-none_compiler-llvm
            build_preset: ninja-multi
            build_dir: build
          - name: linux-x86_64-py314
            runner: ubuntu-24.04
            env_file: conda/environments/dev-linux_os-linux_arch-x86_64_py-314_cuda-none_compiler-llvm.yaml
            env_name: dev-linux_os-linux_arch-x86_64_py-314_cuda-none_compiler-llvm
            build_preset: ninja-multi
            build_dir: build
          - name: linux-arm64-py313
            runner: ubuntu-24.04-arm
            env_file: conda/environments/dev-linux-arm64_os-linux_arch-aarch64_py-313_cuda-none_compiler-llvm.yaml
            env_name: dev-linux-arm64_os-linux_arch-aarch64_py-313_cuda-none_compiler-llvm
            build_preset: ninja-multi
            build_dir: build
          - name: linux-arm64-py314
            runner: ubuntu-24.04-arm
            env_file: conda/environments/dev-linux-arm64_os-linux_arch-aarch64_py-314_cuda-none_compiler-llvm.yaml
            env_name: dev-linux-arm64_os-linux_arch-aarch64_py-314_cuda-none_compiler-llvm
            build_preset: ninja-multi
            build_dir: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: "latest"
          environment-file: ${{ matrix.env_file }}
          environment-name: ${{ matrix.env_name }}
          cache-environment: true
          cache-environment-key: ${{ matrix.name }}

      - name: Configure
        shell: bash -l {0}
        run: |
          micromamba run -n "${{ matrix.env_name }}" cmake --preset "${{ matrix.build_preset }}"

      - name: Build (Release)
        shell: bash -l {0}
        run: |
          micromamba run -n "${{ matrix.env_name }}" cmake --build "${{ matrix.build_dir }}" --config Release --parallel

      - name: Test (Release)
        shell: bash -l {0}
        run: |
          micromamba run -n "${{ matrix.env_name }}" ctest --test-dir "${{ matrix.build_dir }}" --output-on-failure -C Release --timeout 300

      - name: Examples (RawDog JIT + LLVM JIT + sqlite-online-jit)
        shell: bash -l {0}
        run: |
          micromamba run -n "${{ matrix.env_name }}" cmake \
            -S examples/cpp-console-online-rawdog-jit \
            -B "${{ matrix.build_dir }}/examples/cpp-console-online-rawdog-jit" \
            -DPERFECTHASH_ROOT="${GITHUB_WORKSPACE}" \
            -DPerfectHashOnlineRawdog_ROOT="${GITHUB_WORKSPACE}/${{ matrix.build_dir }}"
          micromamba run -n "${{ matrix.env_name }}" cmake \
            --build "${{ matrix.build_dir }}/examples/cpp-console-online-rawdog-jit" \
            --parallel
          micromamba run -n "${{ matrix.env_name }}" \
            "${{ matrix.build_dir }}/examples/cpp-console-online-rawdog-jit/cpp-console-online-rawdog-jit"

          micromamba run -n "${{ matrix.env_name }}" cmake \
            -S examples/cpp-console-online-jit \
            -B "${{ matrix.build_dir }}/examples/cpp-console-online-jit" \
            -DPERFECTHASH_ROOT="${GITHUB_WORKSPACE}" \
            -DPerfectHashOnlineJit_ROOT="${GITHUB_WORKSPACE}/${{ matrix.build_dir }}"
          micromamba run -n "${{ matrix.env_name }}" cmake \
            --build "${{ matrix.build_dir }}/examples/cpp-console-online-jit" \
            --parallel
          micromamba run -n "${{ matrix.env_name }}" \
            "${{ matrix.build_dir }}/examples/cpp-console-online-jit/cpp-console-online-jit" \
            --backend rawdog-jit --vector-width 16
          micromamba run -n "${{ matrix.env_name }}" \
            "${{ matrix.build_dir }}/examples/cpp-console-online-jit/cpp-console-online-jit" \
            --backend llvm-jit --vector-width 1

          micromamba run -n "${{ matrix.env_name }}" cmake \
            -S examples/sqlite-online-jit \
            -B "${{ matrix.build_dir }}/examples/sqlite-online-jit" \
            -DPERFECTHASH_ROOT="${GITHUB_WORKSPACE}" \
            -DPerfectHashOnlineJit_ROOT="${GITHUB_WORKSPACE}/${{ matrix.build_dir }}"
          micromamba run -n "${{ matrix.env_name }}" cmake \
            --build "${{ matrix.build_dir }}/examples/sqlite-online-jit" \
            --parallel
          micromamba run -n "${{ matrix.env_name }}" \
            "${{ matrix.build_dir }}/examples/sqlite-online-jit/sqlite-online-jit" \
            --backend rawdog-jit --dim-size 2000 --fact-size 20000 --iterations 2 --vector-width 16
          micromamba run -n "${{ matrix.env_name }}" \
            "${{ matrix.build_dir }}/examples/sqlite-online-jit/sqlite-online-jit" \
            --backend llvm-jit --dim-size 2000 --fact-size 20000 --iterations 2 --vector-width 1
          micromamba run -n "${{ matrix.env_name }}" \
            "${{ matrix.build_dir }}/examples/sqlite-online-jit/sqlite-online-jit" \
            --matrix --dim-size 512 --fact-size 4096 --iterations 1

      - name: Install Python package test prefix
        if: matrix.name == 'linux-x86_64-py313'
        shell: bash -l {0}
        run: |
          micromamba run -n "${{ matrix.env_name }}" cmake \
            --install "${{ matrix.build_dir }}" \
            --config Release \
            --prefix "${GITHUB_WORKSPACE}/${{ matrix.build_dir }}/python-prefix"

      - name: Python Packaging And Runtime Checks
        if: matrix.name == 'linux-x86_64-py313'
        shell: bash -l {0}
        run: |
          release_version="$(git describe --tags --abbrev=0 --match 'v[0-9]*' | sed 's/^v//')"
          prefix="${GITHUB_WORKSPACE}/${{ matrix.build_dir }}/python-prefix"
          export PERFECTHASH_PREFIX="${prefix}"
          micromamba run -n "${{ matrix.env_name }}" python -m pip install '.[dev]'
          micromamba run -n "${{ matrix.env_name }}" env -u PYTHONPATH pytest -q python_tests
          micromamba run -n "${{ matrix.env_name }}" python -m pip install build
          micromamba run -n "${{ matrix.env_name }}" env -u PYTHONPATH python scripts/build-python-release.py \
            --version "${release_version}" \
            --native-root "${prefix}" \
            --dist-dir "${GITHUB_WORKSPACE}/${{ matrix.build_dir }}/python-dist" \
            --smoke-test-wheel
