name: macos

on:
  push:
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-14
            env_file: conda/environments/dev-macos_os-macos_arch-arm64_py-313_cuda-none_compiler-llvm.yaml
            env_name: dev-macos_os-macos_arch-arm64_py-313_cuda-none_compiler-llvm
            build_preset: ninja-multi
            build_dir: build
          - name: macos-x86_64
            runner: macos-15-intel
            env_file: conda/environments/dev-macos_os-macos_arch-x86_64_py-313_cuda-none_compiler-llvm.yaml
            env_name: dev-macos_os-macos_arch-x86_64_py-313_cuda-none_compiler-llvm
            build_preset: ninja-multi-macos-x86_64
            build_dir: build-macos-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: "latest"
          environment-file: ${{ matrix.env_file }}
          environment-name: ${{ matrix.env_name }}
          cache-environment: true
          cache-environment-key: ${{ matrix.name }}

      - name: Configure
        shell: bash -l {0}
        run: |
          micromamba run -n "${{ matrix.env_name }}" cmake --preset "${{ matrix.build_preset }}"

      - name: Build (Release)
        shell: bash -l {0}
        run: |
          micromamba run -n "${{ matrix.env_name }}" cmake --build "${{ matrix.build_dir }}" --config Release

      - name: Test (Release)
        shell: bash -l {0}
        run: |
          micromamba run -n "${{ matrix.env_name }}" ctest --test-dir "${{ matrix.build_dir }}" --output-on-failure -C Release

      - name: Examples (RawDog JIT + LLVM JIT + sqlite-online-jit)
        shell: bash -l {0}
        run: |
          micromamba run -n "${{ matrix.env_name }}" cmake \
            -S examples/cpp-console-online-rawdog-jit \
            -B "${{ matrix.build_dir }}/examples/cpp-console-online-rawdog-jit" \
            -DPERFECTHASH_ROOT="${GITHUB_WORKSPACE}" \
            -DPerfectHashOnlineRawdog_ROOT="${GITHUB_WORKSPACE}/${{ matrix.build_dir }}"
          micromamba run -n "${{ matrix.env_name }}" cmake \
            --build "${{ matrix.build_dir }}/examples/cpp-console-online-rawdog-jit"
          micromamba run -n "${{ matrix.env_name }}" \
            "${{ matrix.build_dir }}/examples/cpp-console-online-rawdog-jit/cpp-console-online-rawdog-jit"

          micromamba run -n "${{ matrix.env_name }}" cmake \
            -S examples/cpp-console-online-jit \
            -B "${{ matrix.build_dir }}/examples/cpp-console-online-jit" \
            -DPERFECTHASH_ROOT="${GITHUB_WORKSPACE}" \
            -DPerfectHashOnlineJit_ROOT="${GITHUB_WORKSPACE}/${{ matrix.build_dir }}"
          micromamba run -n "${{ matrix.env_name }}" cmake \
            --build "${{ matrix.build_dir }}/examples/cpp-console-online-jit"
          micromamba run -n "${{ matrix.env_name }}" \
            "${{ matrix.build_dir }}/examples/cpp-console-online-jit/cpp-console-online-jit" \
            --backend rawdog-jit --vector-width 16
          micromamba run -n "${{ matrix.env_name }}" \
            "${{ matrix.build_dir }}/examples/cpp-console-online-jit/cpp-console-online-jit" \
            --backend llvm-jit --vector-width 1

          micromamba run -n "${{ matrix.env_name }}" cmake \
            -S examples/sqlite-online-jit \
            -B "${{ matrix.build_dir }}/examples/sqlite-online-jit" \
            -DPERFECTHASH_ROOT="${GITHUB_WORKSPACE}" \
            -DPerfectHashOnlineJit_ROOT="${GITHUB_WORKSPACE}/${{ matrix.build_dir }}"
          micromamba run -n "${{ matrix.env_name }}" cmake \
            --build "${{ matrix.build_dir }}/examples/sqlite-online-jit"
          micromamba run -n "${{ matrix.env_name }}" \
            "${{ matrix.build_dir }}/examples/sqlite-online-jit/sqlite-online-jit" \
            --backend rawdog-jit --dim-size 2000 --fact-size 20000 --iterations 2 --vector-width 16
          micromamba run -n "${{ matrix.env_name }}" \
            "${{ matrix.build_dir }}/examples/sqlite-online-jit/sqlite-online-jit" \
            --backend llvm-jit --dim-size 2000 --fact-size 20000 --iterations 2 --vector-width 1
