name: conda-package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version override (defaults to git tag or latest git tag)"
        required: false
        type: string
  pull_request:
    paths:
      - conda/recipe/**
      - CMakeLists.txt
      - cmake/**
      - src/**
      - pyproject.toml
      - hatch_build.py
      - python_src/**
      - python_tests/**
      - scripts/build-python-release.py

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    env:
      ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
      DISPATCH_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          activate-environment: conda-build
          auto-activate-base: false
          channels: conda-forge
          channel-priority: strict

      - name: Install conda-build toolchain
        shell: bash -l {0}
        run: |
          conda install -y conda-build boa anaconda-client nasm

      - name: Resolve package version
        id: version
        shell: bash -l {0}
        run: |
          if [ -n "${DISPATCH_VERSION}" ]; then
            version="${DISPATCH_VERSION}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo v0.0.0)"
          fi
          version="${version#v}"
          echo "PERFECTHASH_CONDA_VERSION=${version}" >> "$GITHUB_ENV"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Resolve release source archive (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash -l {0}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${tag}.tar.gz"
          archive_path="${RUNNER_TEMP}/perfecthash-${tag}.tar.gz"
          curl -LfsS "$url" -o "$archive_path"
          sha256="$(sha256sum "$archive_path" | awk '{print $1}')"
          echo "PERFECTHASH_CONDA_SOURCE_URL=${url}" >> "$GITHUB_ENV"
          echo "PERFECTHASH_CONDA_SOURCE_SHA256=${sha256}" >> "$GITHUB_ENV"
          echo "Resolved source archive: ${url}"
          echo "Resolved source sha256: ${sha256}"

      - name: Render output package list
        shell: bash -l {0}
        run: |
          conda build conda/recipe --output

      - name: Build conda packages (linux multi-output)
        shell: bash -l {0}
        run: |
          conda build conda/recipe --output-folder conda/out --no-anaconda-upload

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conda-${{ steps.version.outputs.version }}-linux-multi-output
          path: |
            conda/out/**/*.conda
            conda/out/**/*.tar.bz2

      - name: Publish to Anaconda.org user channel (optional, not conda-forge)
        if: startsWith(github.ref, 'refs/tags/') && env.ANACONDA_API_TOKEN != ''
        shell: bash -l {0}
        run: |
          upload_user="${ANACONDA_UPLOAD_USER:-perfecthash}"
          shopt -s globstar nullglob
          artifacts=(conda/out/**/*.conda conda/out/**/*.tar.bz2)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "error: no conda artifacts found under conda/out" >&2
            exit 1
          fi
          anaconda -t "$ANACONDA_API_TOKEN" upload \
            --user "$upload_user" \
            --label main \
            --skip-existing \
            "${artifacts[@]}"
