name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (defaults to tag or latest git tag)"
        required: false
        type: string
      profile:
        description: "Build profile"
        required: false
        default: full
        type: choice
        options:
          - full
          - online-rawdog
          - online-rawdog-llvm

permissions:
  contents: write

jobs:
  linux:
    name: linux-${{ matrix.arch }}-${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'full' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            env_file: conda/environments/dev-linux_os-linux_arch-x86_64_py-313_cuda-none_compiler-llvm.yaml
            env_name: dev-linux_os-linux_arch-x86_64_py-313_cuda-none_compiler-llvm
          - arch: arm64
            runner: ubuntu-24.04-arm
            env_file: conda/environments/dev-linux-arm64_os-linux_arch-aarch64_py-313_cuda-none_compiler-llvm.yaml
            env_name: dev-linux-arm64_os-linux_arch-aarch64_py-313_cuda-none_compiler-llvm
    env:
      RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
      RELEASE_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'full' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: "latest"
          environment-file: ${{ matrix.env_file }}
          environment-name: ${{ matrix.env_name }}
          cache-environment: true
          cache-environment-key: release-${{ matrix.arch }}

      - name: Build release
        shell: bash -l {0}
        run: |
          micromamba run -n "${{ matrix.env_name }}" ci/release-linux.sh --profile "${{ env.RELEASE_PROFILE }}" --clean

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.RELEASE_PROFILE }}-linux-${{ matrix.arch }}
          path: out/release/**/dist/*

  macos:
    name: macos-${{ matrix.arch }}-${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'full' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            env_file: conda/environments/dev-macos_os-macos_arch-arm64_py-313_cuda-none_compiler-llvm.yaml
            env_name: dev-macos_os-macos_arch-arm64_py-313_cuda-none_compiler-llvm
          - arch: x86_64
            runner: macos-13
            env_file: conda/environments/dev-macos_os-macos_arch-x86_64_py-313_cuda-none_compiler-llvm.yaml
            env_name: dev-macos_os-macos_arch-x86_64_py-313_cuda-none_compiler-llvm
    env:
      RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
      RELEASE_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'full' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-version: "latest"
          environment-file: ${{ matrix.env_file }}
          environment-name: ${{ matrix.env_name }}
          cache-environment: true
          cache-environment-key: release-${{ matrix.arch }}

      - name: Build release
        shell: bash -l {0}
        run: |
          micromamba run -n "${{ matrix.env_name }}" ci/release-macos.sh --profile "${{ env.RELEASE_PROFILE }}" --arch "${{ matrix.arch }}" --clean

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.RELEASE_PROFILE }}-macos-${{ matrix.arch }}
          path: out/release/**/dist/*

  windows:
    name: windows-x86_64-${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'full' }}
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
      RELEASE_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'full' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ninja
        run: choco install ninja -y

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: "2022"

      - name: Build release
        shell: pwsh
        run: |
          pwsh -File ci/release-windows.ps1 -ReleaseVersion $env:RELEASE_VERSION -BuildProfile $env:RELEASE_PROFILE -Clean

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.RELEASE_PROFILE }}-windows-x86_64
          path: out/release/**/dist/*

  publish:
    name: publish
    runs-on: ubuntu-24.04
    needs: [linux, macos, windows]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          ci/generate-release-notes.sh --tag "${{ github.ref_name }}" --output release-notes.generated.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: release-notes.generated.md
