{% set name = "perfecthash" %}
{% set version = environ.get("PERFECTHASH_CONDA_VERSION", "0.0.0") %}
{% set source_url = environ.get("PERFECTHASH_CONDA_SOURCE_URL", "") %}
{% set source_sha256 = environ.get("PERFECTHASH_CONDA_SOURCE_SHA256", "") %}

package:
  name: {{ name }}-suite
  version: {{ version }}

source:
  {% if source_url %}
  url: {{ source_url }}
  sha256: {{ source_sha256 }}
  {% else %}
  path: ../..
  {% endif %}

build:
  number: 0

about:
  home: https://github.com/tpn/perfecthash
  summary: Perfect hash table generation and online JIT runtime libraries.
  license: BSD-3-Clause
  license_file: LICENSE

description: |
  PerfectHash builds fast perfect hash table generation/runtime libraries with
  profile-aware CMake outputs and release automation.

outputs:
  - name: perfecthash-online-rawdog-jit
    build:
      skip: true  # [not linux]
      script:
        - export PERFECTHASH_BUILD_PROFILE=online-rawdog-jit
        - export PERFECTHASH_VERSION_OVERRIDE={{ version }}
        - bash "${RECIPE_DIR}/build.sh"
    files:
      - include/PerfectHash/*
      - lib/libPerfectHash*
      - lib/cmake/PerfectHash/*
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - cmake >=3.20
        - ninja
        - nasm
        - make
        - pkg-config
      run_constrained:
        - perfecthash-full <0a0
        - perfecthash-online-rawdog-and-llvm-jit <0a0
        - perfecthash-online-llvm-jit <0a0
    test:
      commands:
        - test -f $PREFIX/include/PerfectHash/PerfectHash.h
        - test -f $PREFIX/lib/cmake/PerfectHash/PerfectHashConfig.cmake

  - name: perfecthash-online-rawdog-and-llvm-jit
    build:
      skip: true  # [not linux]
      script:
        - export PERFECTHASH_BUILD_PROFILE=online-rawdog-and-llvm-jit
        - export PERFECTHASH_VERSION_OVERRIDE={{ version }}
        - bash "${RECIPE_DIR}/build.sh"
    files:
      - include/PerfectHash/*
      - lib/libPerfectHash*
      - lib/cmake/PerfectHash/*
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - cmake >=3.20
        - ninja
        - nasm
        - make
        - pkg-config
      host:
        - llvmdev >=15
      run:
        - llvmdev >=15
      run_constrained:
        - perfecthash-full <0a0
        - perfecthash-online-llvm-jit <0a0
        - perfecthash-online-rawdog-jit <0a0
    test:
      commands:
        - test -f $PREFIX/include/PerfectHash/PerfectHash.h
        - test -f $PREFIX/lib/cmake/PerfectHash/PerfectHashConfig.cmake

  - name: perfecthash-online-llvm-jit
    build:
      skip: true  # [not linux]
      script:
        - export PERFECTHASH_BUILD_PROFILE=online-llvm-jit
        - export PERFECTHASH_VERSION_OVERRIDE={{ version }}
        - bash "${RECIPE_DIR}/build.sh"
    files:
      - include/PerfectHash/*
      - lib/libPerfectHash*
      - lib/cmake/PerfectHash/*
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - cmake >=3.20
        - ninja
        - nasm
        - make
        - pkg-config
      host:
        - llvmdev >=15
      run:
        - llvmdev >=15
      run_constrained:
        - perfecthash-full <0a0
        - perfecthash-online-rawdog-and-llvm-jit <0a0
        - perfecthash-online-rawdog-jit <0a0
    test:
      commands:
        - test -f $PREFIX/include/PerfectHash/PerfectHash.h
        - test -f $PREFIX/lib/cmake/PerfectHash/PerfectHashConfig.cmake

  - name: perfecthash-full
    build:
      skip: true  # [not linux]
      script:
        - export PERFECTHASH_BUILD_PROFILE=full
        - export PERFECTHASH_VERSION_OVERRIDE={{ version }}
        - bash "${RECIPE_DIR}/build.sh"
    files:
      - bin/PerfectHash*
      - include/PerfectHash/*
      - lib/libPerfectHash*
      - lib/cmake/PerfectHash/*
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - cmake >=3.20
        - ninja
        - nasm
        - make
        - pkg-config
      host:
        - llvmdev >=15
      run:
        - llvmdev >=15
      run_constrained:
        - perfecthash-online-llvm-jit <0a0
        - perfecthash-online-rawdog-and-llvm-jit <0a0
        - perfecthash-online-rawdog-jit <0a0
    test:
      commands:
        - test -f $PREFIX/include/PerfectHash/PerfectHash.h
        - test -f $PREFIX/lib/cmake/PerfectHash/PerfectHashConfig.cmake

  - name: perfecthash-python
    build:
      skip: true  # [not linux]
      script:
        - export PERFECTHASH_VERSION_OVERRIDE={{ version }}
        - bash "${RECIPE_DIR}/build-python.sh"
    files:
      - bin/ph
      - lib/python*/site-packages/perfecthash/**
      - lib/python*/site-packages/tpn_perfecthash-*.dist-info/**
    requirements:
      host:
        - python >=3.12
        - pip
        - hatchling >=1.27
      run:
        - {{ pin_subpackage('perfecthash-full', exact=True) }}
        - python >=3.12
        - pydantic >=2.11
        - typer >=0.16
    test:
      commands:
        - ph --version
        - ph create keys/example.keys out --hash-function MultiplyShiftR --dry-run
        - python -c "import perfecthash; assert perfecthash.__version__ == '{{ version }}'"
        - python -c "from perfecthash import build_table; keys=[1, 3, 5, 7, 11, 13, 17, 19]; table = build_table(keys, hash_function='MultiplyShiftR'); indexes = table.index_many(keys); assert len(indexes) == len(keys); table.close()"

  - name: perfecthash
    build:
      skip: true  # [not linux]
    requirements:
      run:
        - {{ pin_subpackage('perfecthash-full', exact=True) }}
        - {{ pin_subpackage('perfecthash-python', exact=True) }}
    test:
      commands:
        - test -f $PREFIX/include/PerfectHash/PerfectHash.h
        - test -f $PREFIX/lib/cmake/PerfectHash/PerfectHashConfig.cmake
        - ph --version

extra:
  recipe-maintainers:
    - tpn
