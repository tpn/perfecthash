repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: env -u PYTHONPATH uv run --group dev ruff check --fix
        language: system
        pass_filenames: true
        files: ^(python_src/|python_tests/|pyproject\.toml$)
        types_or: [python, pyi]
      - id: black
        name: black
        entry: env -u PYTHONPATH uv run --group dev black
        language: system
        pass_filenames: true
        files: ^(python_src/|python_tests/)
        types_or: [python, pyi]
